version: '3'
services:
  shinobi:
    build:
      context: .
      args:
        SHINOBI_BRANCH: dev
    volumes:
      - /DATA/AppData/shinobidocker-shinobi-1/streams:/dev/shm/streams
      - /DATA/AppData/shinobidocker-shinobi-1/data:/home/Shinobi
    ports:
      - "8080:8080"
    environment:
      - HOME=/home/Shinobi
      - DB_HOST=shinobi-sql
      - DB_USER=majesticflame
      - DB_PASSWORD=1234
      - DB_DATABASE=ccio
      - SHINOBI_UPDATE=false
    extra_hosts: # comment this if you aren't use linux
      - "host.docker.internal:host-gateway" # comment this if you aren't use linux
    restart: unless-stopped
